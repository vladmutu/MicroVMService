version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: dynamic-analysis-postgres
    environment:
      POSTGRES_DB: dynamic_analysis
      POSTGRES_USER: analysis
      POSTGRES_PASSWORD: analysis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analysis -d dynamic_analysis"]
      interval: 5s
      timeout: 3s
      retries: 5

  dynamic-analysis:
    build: .
    container_name: dynamic-analysis-service
    privileged: true
    ports:
      - "8080:8080"
    devices:
      - "/dev/kvm:/dev/kvm"
    tmpfs:
      - /run
      - /tmp
    environment:
      PROVIDER_NAME: sentinelflow-dynamic-analysis
      ANALYSIS_TIMEOUT_SECONDS: 120
      MAX_CONCURRENT_VMS: 4
      VM_ANALYSIS_TIMEOUT_SECONDS: 120
      VM_BOOT_TIMEOUT_SECONDS: 15
      VM_INGRESS_TIMEOUT_SECONDS: 10
      PACKAGE_DOWNLOAD_TIMEOUT_SECONDS: 15
      PACKAGE_DOWNLOAD_MAX_BYTES: 52428800
      FIRECRACKER_BINARY: /usr/local/bin/firecracker
      FIRECRACKER_DEFAULT_KERNEL: /opt/firecracker/vmlinux
      FIRECRACKER_DEFAULT_ROOTFS: /opt/firecracker/rootfs.ext4
      FIRECRACKER_WORKDIR: /tmp/dynamic-analysis
      TAP_ENABLED: "true"
      TAP_HOST_INTERFACE: eth0
      CID_RANGE_START: 3
      CID_RANGE_END: 100
      POSTGRES_DSN: postgresql://analysis:analysis@postgres:5432/dynamic_analysis
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
